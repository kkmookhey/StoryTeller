# StoryTeller configuration.
# Copy to ~/.storyteller/config.yaml and edit. The install script copies this on first run.

sources:
  github:
    enabled: true
    repos:
      # Add your personal repos here as "owner/name". Examples from gh repo list:
      # - kkmookhey/ciso-copilot
      # - kkmookhey/basecamp-ai-sec
      # - kkmookhey/communitytools
    only_authored_by_me: false
    lookback_days: 7

  slack:
    enabled: true                  # Slice E
    channels:
      # Add real Slack channel IDs here. Use mcp__claude_ai_Slack__slack_search_channels to find them.
      # Examples (replace with your own):
      # - C0EXAMPLE01  # #your-eng-channel
      # - C0EXAMPLE02  # #your-marketing-channel
      # - C0EXAMPLE03  # #your-general-channel
    lookback_days: 7
    min_reactions: 3               # Stage 1 threshold (reactions filter)
    min_replies: 3                 # Stage 2 (thread-root fallback) threshold
    fallback_threshold: 6          # When Stage 1 count < this, also include thread roots. Defaults to 2 * scoring.top_n.

  atlassian:
    enabled: false  # Slice E
    confluence_spaces: []
    jira_jql: "status = Done AND updated >= -7d AND labels in (release, feature)"

scoring:
  rubric: jennifer
  top_n: 3                         # Scheduled mode auto-picks this many; interactive mode uses this as the recommended pick count.
  menu_size: 10                    # Interactive idea-menu width (candidate pool kept after score-cutoff).

drafting:
  formats:
    - { platform: linkedin,  format: long-post, enabled: true }
    - { platform: x,         format: thread,    enabled: true }
    - { platform: instagram, format: caption,   enabled: true, hold: true }
    - { platform: reels,     format: script,    enabled: true, hold: true }

publishing:
  postiz:
    push_as_draft: true        # ALWAYS true. Never auto-publishes.
    workspace_id: null
    integrations:              # Run `postiz integrations:list` to find yours
      linkedin: "<your-linkedin-integration-id>"
      x: "<your-x-integration-id>"
      instagram: ""            # Not yet connected; for Slice F
      youtube: ""              # Not yet connected; for Slice G

notification:
  slack:
    target: "<your-slack-user-id>"   # Self-DM target (find via slack_search_users)
    template: "{count} drafts queued in Postiz. Top: '{top_title}'. /storyteller to review."

state:
  retention_days: 90
